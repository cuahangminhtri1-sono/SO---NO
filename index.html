function displayNumber(v){var s=fmt(v);return s===&quot;—&quot;?0:parseFloat(s);}
function num(id){var el=document.getElementById(id);if(!el)return 0;var v=parseFloat(el.value);return isFinite(v)?v:0;}
function setText(id,t){var el=document.getElementById(id);if(el)el.textContent=t;}

              +&#x27;&lt;div class=&quot;tcm&quot;&gt;&lt;span&gt;&#x27;+rn+&#x27;&lt;/span&gt;&lt;span class=&quot;v&quot; id=&quot;m_&#x27;+key+&#x27;_&#x27;+i+&#x27;&quot;&gt;—&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;;

        cost+=&#x27;&lt;div class=&quot;mline&quot;&gt;&lt;span class=&quot;mlbl&quot;&gt;&#x27;+subLbl+&#x27;&lt;/span&gt;&lt;span class=&quot;mval&quot; id=&quot;m_&#x27;+key+&#x27;&quot;&gt;—&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;;
      } else {

            +&#x27;&lt;div class=&quot;cf&quot;&gt;&lt;label&gt;GIÁ / &#x27;+item.u+&#x27; (đ)&lt;/label&gt;&lt;input type=&quot;number&quot; inputmode=&quot;numeric&quot; id=&quot;p_&#x27;+key+&#x27;&quot; placeholder=&quot;0&quot; min=&quot;0&quot; step=&quot;1&quot; value=&quot;&#x27;+lsGet(&#x27;p_&#x27;+key)+&#x27;&quot; oninput=&quot;onCost(this)&quot;/&gt;&lt;/div&gt;&#x27;
            +&#x27;&lt;div class=&quot;cf&quot;&gt;&lt;label&gt;SỐ NGÀY&lt;/label&gt;&lt;input type=&quot;number&quot; inputmode=&quot;numeric&quot; id=&quot;n_&#x27;+key+&#x27;&quot; placeholder=&quot;0&quot; min=&quot;0&quot; step=&quot;1&quot; value=&quot;&#x27;+lsGet(&#x27;n_&#x27;+key)+&#x27;&quot; oninput=&quot;onCost(this)&quot;/&gt;&lt;/div&gt;&lt;/div&gt;&#x27;
            +&#x27;&lt;div class=&quot;mline&quot;&gt;&lt;span class=&quot;mlbl&quot;&gt;&lt;span id=&quot;lbl_&#x27;+key+&#x27;&quot;&gt;Thành tiền&lt;/span&gt;&lt;span class=&quot;pd&quot; id=&quot;pd_&#x27;+key+&#x27;&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mval&quot; id=&quot;m_&#x27;+key+&#x27;&quot;&gt;—&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;;
      }
      html+=&#x27;&lt;div class=&quot;card&quot; id=&quot;card_&#x27;+key+&#x27;&quot; style=&quot;animation-delay:&#x27;+delay+&#x27;ms&quot;&gt;&lt;div class=&quot;stripe&quot; style=&quot;background:&#x27;+col+&#x27;&quot;&gt;&lt;/div&gt;&#x27;
          +&#x27;&lt;div class=&quot;codecol&quot;&gt;&lt;div class=&quot;code&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+item.c+&#x27;&lt;/div&gt;&lt;div class=&quot;badge &#x27;+bc+&#x27;&quot;&gt;&#x27;+bt+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;
          +&#x27;&lt;div class=&quot;body&quot;&gt;&lt;div class=&quot;nmrow&quot;&gt;&lt;span class=&quot;nm&quot;&gt;&#x27;+item.nm+&#x27;&lt;/span&gt;&#x27;+tagH+&#x27;&lt;/div&gt;&#x27;
          +&#x27;&lt;div class=&quot;formula&quot;&gt;&#x27;+item.f+&#x27;&lt;/div&gt;&#x27;
          +&#x27;&lt;div id=&quot;r_&#x27;+key+&#x27;&quot;&gt;&lt;div class=&quot;dval na&quot;&gt;Nhập số liệu ở trên&lt;/div&gt;&lt;/div&gt;&#x27;
          +warnH+cost+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
    });
  });
  document.getElementById(&#x27;results&#x27;).innerHTML=html;
}

/* ====== CẬP NHẬT LIỀU (logic giữ nguyên bản đã kiểm chứng) ====== */
function calc(){
  var bird=num(&#x27;cBird&#x27;), kgb=num(&#x27;cKgB&#x27;), tot=num(&#x27;cTotKg&#x27;), feed=num(&#x27;cFeed&#x27;);
  var kg=tot&gt;0?tot:(bird&gt;0&amp;&amp;kgb&gt;0?bird*kgb:0);
  [&#x27;cBird&#x27;,&#x27;cKgB&#x27;,&#x27;cTotKg&#x27;,&#x27;cFeed&#x27;].forEach(function(id){var el=document.getElementById(id);if(el)el.className=el.value?&#x27;on&#x27;:&#x27;&#x27;;});
  var basis=document.getElementById(&#x27;basis&#x27;);
  if(kg||feed){basis.classList.add(&#x27;on&#x27;);
    var parts=[]; if(kg)parts.push(&#x27;&lt;b&gt;&#x27;+kgFmt(kg)+&#x27;&lt;/b&gt; kg&#x27;); if(feed)parts.push(&#x27;&lt;b&gt;&#x27;+kgFmt(feed)+&#x27;&lt;/b&gt; cám&#x27;);
    document.getElementById(&#x27;bTxt&#x27;).innerHTML=parts.join(&#x27; · &#x27;);
  } else {basis.classList.remove(&#x27;on&#x27;);setText(&#x27;bTxt&#x27;,&#x27;chưa nhập&#x27;);}

  ITEMS.forEach(function(item){
    var key=item.key, col=CC[item.c]||&#x27;#888&#x27;, html=&#x27;&#x27;;
    if(item.tp===&#x27;wt&#x27;){
      var q=kg*item.d;
      html=kg&gt;0?(&#x27;&lt;div class=&quot;dwrap&quot; onclick=&quot;copyEl(this)&quot;&gt;&lt;span class=&quot;dval&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+fmt(q)+&#x27;&lt;/span&gt;&lt;span class=&quot;copyhint&quot;&gt;copy&lt;/span&gt;&lt;div class=&quot;dunit&quot;&gt;&#x27;+item.u+&#x27; / ngày &amp;nbsp;&lt;span class=&quot;calc&quot;&gt;&#x27;+kgFmt(kg)+&#x27;kg × &#x27;+item.d+&#x27;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;):&#x27;&lt;div class=&quot;dval na&quot;&gt;Nhập kg đàn&lt;/div&gt;&#x27;;
    } else if(item.tp===&#x27;tab&#x27;){
      var qt=kg&gt;0?Math.ceil(kg/item.d):0;
      html=kg&gt;0?(&#x27;&lt;div class=&quot;dwrap&quot; onclick=&quot;copyEl(this)&quot;&gt;&lt;span class=&quot;dval&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+qt+&#x27;&lt;/span&gt;&lt;span class=&quot;copyhint&quot;&gt;copy&lt;/span&gt;&lt;div class=&quot;dunit&quot;&gt;&#x27;+item.u+&#x27; / ngày &lt;span class=&quot;calc&quot;&gt;(làm tròn lên)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;):&#x27;&lt;div class=&quot;dval na&quot;&gt;Nhập kg đàn&lt;/div&gt;&#x27;;
    } else if(item.tp===&#x27;fg&#x27;){
      var qf=feed*item.d;
      html=feed&gt;0?(&#x27;&lt;div class=&quot;dwrap&quot; onclick=&quot;copyEl(this)&quot;&gt;&lt;span class=&quot;dval&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+fmt(qf)+&#x27;&lt;/span&gt;&lt;span class=&quot;copyhint&quot;&gt;copy&lt;/span&gt;&lt;div class=&quot;dunit&quot;&gt;&#x27;+item.u+&#x27; &amp;nbsp;&lt;span class=&quot;calc&quot;&gt;&#x27;+kgFmt(feed)+&#x27;kg × &#x27;+item.d+&#x27;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;):&#x27;&lt;div class=&quot;dval na&quot;&gt;Nhập kg cám&lt;/div&gt;&#x27;;
    } else if(item.tp===&#x27;feed&#x27;){
      var batch=feed*0.4, qfeed=batch*item.d;
      html=feed&gt;0?(&#x27;&lt;div class=&quot;dwrap&quot; onclick=&quot;copyEl(this)&quot;&gt;&lt;span class=&quot;dval&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+fmt(qfeed)+&#x27;&lt;/span&gt;&lt;span class=&quot;copyhint&quot;&gt;copy&lt;/span&gt;&lt;div class=&quot;dunit&quot;&gt;&#x27;+item.u+&#x27; &lt;span class=&quot;calc&quot;&gt;trộn vào &#x27;+kgFmt(batch)+&#x27;kg cám (40%)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&#x27;):&#x27;&lt;div class=&quot;dval na&quot;&gt;Nhập kg cám&lt;/div&gt;&#x27;;
    } else if(item.tp===&#x27;tap&#x27;){
      if(kg&gt;0){
        var lb=[&#x27;Ngày 1–2&#x27;,&#x27;Ngày 3&#x27;,&#x27;Ngày 4–5&#x27;], rows=&#x27;&#x27;;
        item.ds.forEach(function(r,i){
          rows+=&#x27;&lt;div class=&quot;trow&quot;&gt;&lt;div&gt;&lt;div class=&quot;tl&quot;&gt;&#x27;+lb[i]+&#x27;&lt;/div&gt;&lt;div class=&quot;ts&quot;&gt;&#x27;+kgFmt(kg)+&#x27;kg × &#x27;+r[0]+&#x27;–&#x27;+r[1]+&#x27;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;tv&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+fmt(kg*r[0])+&#x27;–&#x27;+fmt(kg*r[1])+&#x27; ml&lt;/div&gt;&lt;/div&gt;&#x27;;
        });
        html=&#x27;&lt;div class=&quot;taper&quot;&gt;&#x27;+rows+&#x27;&lt;/div&gt;&#x27;;
      } else html=&#x27;&lt;div class=&quot;dval na&quot;&gt;Nhập kg đàn&lt;/div&gt;&#x27;;
    } else if(item.tp===&#x27;combo&#x27;){
      if(kg&gt;0){
        var rows=&#x27;&#x27;;
        item.parts.forEach(function(p){
          var q=kg*p.d;
          rows+=&#x27;&lt;div class=&quot;trow&quot;&gt;&lt;div&gt;&lt;div class=&quot;tl&quot;&gt;&#x27;+p.n+&#x27;&lt;/div&gt;&lt;div class=&quot;ts&quot;&gt;&#x27;+kgFmt(kg)+&#x27;kg × &#x27;+p.d+&#x27;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;tv&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+fmt(q)+&#x27; &#x27;+item.u+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
        });
        html=&#x27;&lt;div class=&quot;taper&quot;&gt;&#x27;+rows+&#x27;&lt;/div&gt;&#x27;;
      } else html=&#x27;&lt;div class=&quot;dval na&quot;&gt;Nhập kg đàn&lt;/div&gt;&#x27;;
    } else if(item.tp===&#x27;multi&#x27;){
      var needFeed=(item.base===&#x27;feed&#x27;);
      var have=needFeed?(feed&gt;0):(kg&gt;0);
      if(have){
        var base=needFeed?(feed*0.4):kg;
        var rows=&#x27;&#x27;;
        item.multi.forEach(function(m){
          var q=base*m.d;
          var wn=m.w?&#x27;&lt;div class=&quot;ts&quot; style=&quot;color:#FFD23F&quot;&gt;⚠ &#x27;+m.w+&#x27;&lt;/div&gt;&#x27;:&#x27;&#x27;;
          rows+=&#x27;&lt;div class=&quot;trow&quot;&gt;&lt;div&gt;&lt;div class=&quot;tl&quot;&gt;&#x27;+m.tag+&#x27;&lt;/div&gt;&lt;div class=&quot;ts&quot;&gt;&#x27;+m.sub+&#x27; · &#x27;+kgFmt(base)+&#x27;kg×&#x27;+m.d+&#x27;&lt;/div&gt;&#x27;+wn+&#x27;&lt;/div&gt;&lt;div class=&quot;tv&quot; style=&quot;color:&#x27;+col+&#x27;&quot;&gt;&#x27;+fmt(q)+&#x27; &#x27;+item.u+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
        });
        var bn=needFeed?&#x27;&lt;div class=&quot;ts&quot; style=&quot;margin-bottom:6px;color:#8890AB&quot;&gt;batch = cám × 40% = &#x27;+kgFmt(base)+&#x27;kg&lt;/div&gt;&#x27;:&#x27;&#x27;;
        html=&#x27;&lt;div class=&quot;taper&quot;&gt;&#x27;+bn+rows+&#x27;&lt;/div&gt;&#x27;;
      } else html=&#x27;&lt;div class=&quot;dval na&quot;&gt;&#x27;+(needFeed?&#x27;Nhập kg cám&#x27;:&#x27;Nhập kg đàn&#x27;)+&#x27;&lt;/div&gt;&#x27;;
    }
    var r=document.getElementById(&#x27;r_&#x27;+key); if(r) r.innerHTML=html;
  });
  recalcMoneyOnly();
}

/* ====== TÍNH TIỀN (logic giữ nguyên bản đã kiểm chứng + per-day) ====== */
function recalcMoneyOnly(){
  var bird=num(&#x27;cBird&#x27;), kgb=num(&#x27;cKgB&#x27;), tot=num(&#x27;cTotKg&#x27;), feed=num(&#x27;cFeed&#x27;);
  var kg=tot&gt;0?tot:(bird&gt;0&amp;&amp;kgb&gt;0?bird*kgb:0);
  var totalLow=0, totalHigh=0, hasRange=false, cnt=0;
  ITEMS.forEach(function(item){
    var key=item.key, price=num(&#x27;p_&#x27;+key);
    if(item.tp===&#x27;tap&#x27;||item.tp===&#x27;multi&#x27;){
      var nrow=(item.tp===&#x27;tap&#x27;)?item.ds.length:item.multi.length;
      var lowSum=0, highSum=0, used=false;
      for(var i=0;i&lt;nrow;i++){
        var days=num(&#x27;n_&#x27;+key+&#x27;_&#x27;+i);
        var qlo,qhi,rn;
        if(item.tp===&#x27;tap&#x27;){
          rn=[&#x27;Ngày 1–2&#x27;,&#x27;Ngày 3&#x27;,&#x27;Ngày 4–5&#x27;][i];
          qlo=kg&gt;0?displayNumber(kg*item.ds[i][0]):0;
          qhi=kg&gt;0?displayNumber(kg*item.ds[i][1]):0;
        } else {
          var m=item.multi[i]; rn=m.tag;
          var base=(item.base===&#x27;feed&#x27;)?(feed&gt;0?(feed*0.4):0):kg;
          var q=base&gt;0?displayNumber(base*m.d):0; qlo=q; qhi=q;
        }
        var single=(qlo===qhi);
        setText(&#x27;lbl_&#x27;+key+&#x27;_&#x27;+i, rn+&#x27; · &#x27;+(single?(qlo||&#x27;—&#x27;):((qlo||&#x27;—&#x27;)+&#x27;–&#x27;+(qhi||&#x27;—&#x27;)))+&#x27; &#x27;+item.u+&#x27;/ngày&#x27;);
        var lo=(qlo&gt;0&amp;&amp;price&gt;0&amp;&amp;days&gt;0)?qlo*price*days:0;
        var hi=(qhi&gt;0&amp;&amp;price&gt;0&amp;&amp;days&gt;0)?qhi*price*days:0;
        if(lo||hi)used=true;
        lowSum+=lo; highSum+=hi;
        setText(&#x27;m_&#x27;+key+&#x27;_&#x27;+i,(lo||hi)?(single?money(lo):money(lo)+&#x27;–&#x27;+money(hi)):&#x27;—&#x27;);
      }
      totalLow+=lowSum; totalHigh+=highSum;
      if(highSum&gt;lowSum) hasRange=true;
      if(used)cnt++;
      setText(&#x27;m_&#x27;+key,(lowSum||highSum)?(lowSum===highSum?money(lowSum):money(lowSum)+&#x27;–&#x27;+money(highSum)):&#x27;—&#x27;);
    } else if(item.tp===&#x27;combo&#x27;){
      var days=num(&#x27;n_&#x27;+key), sum=0, used=false;
      item.parts.forEach(function(p,i){
        var qty=kg&gt;0?displayNumber(kg*p.d):0;
        var price=num(&#x27;p_&#x27;+key+&#x27;_&#x27;+i);
        var cost=(qty&gt;0&amp;&amp;price&gt;0&amp;&amp;days&gt;0)?qty*price*days:0;
        sum+=cost;
        if(cost&gt;0) used=true;
        setText(&#x27;lbl_&#x27;+key+&#x27;_&#x27;+i,p.n+&#x27; · &#x27;+(qty||&#x27;—&#x27;)+&#x27; &#x27;+item.u+&#x27;/ngày&#x27;);
        setText(&#x27;pd_&#x27;+key+&#x27;_&#x27;+i,(qty&gt;0&amp;&amp;price&gt;0)?&#x27;  (&#x27;+money(qty*price)+&#x27;/ngày)&#x27;:&#x27;&#x27;);
        setText(&#x27;m_&#x27;+key+&#x27;_&#x27;+i,money(cost));
      });
      totalLow+=sum; totalHigh+=sum;
      if(used)cnt++;
      setText(&#x27;m_&#x27;+key,money(sum));
    } else {
      var days=num(&#x27;n_&#x27;+key), qty=0;
      if(item.tp===&#x27;wt&#x27;) qty=kg&gt;0?displayNumber(kg*item.d):0;
      else if(item.tp===&#x27;tab&#x27;) qty=kg&gt;0?Math.ceil(kg/item.d):0;
      else if(item.tp===&#x27;fg&#x27;) qty=feed&gt;0?displayNumber(feed*item.d):0;
      else if(item.tp===&#x27;feed&#x27;) qty=feed&gt;0?displayNumber((feed*0.4)*item.d):0;
      var cost=(qty&gt;0&amp;&amp;price&gt;0&amp;&amp;days&gt;0)?qty*price*days:0;
      totalLow+=cost; totalHigh+=cost;
      if(cost&gt;0)cnt++;
      setText(&#x27;lbl_&#x27;+key,&#x27;Thành tiền · &#x27;+(qty||&#x27;—&#x27;)+&#x27; &#x27;+item.u+&#x27;/ngày&#x27;);
      setText(&#x27;pd_&#x27;+key,(qty&gt;0&amp;&amp;price&gt;0)?&#x27;  (&#x27;+money(qty*price)+&#x27;/ngày)&#x27;:&#x27;&#x27;);
      setText(&#x27;m_&#x27;+key, money(cost));
    }
  });
  if(hasRange &amp;&amp; totalHigh&gt;totalLow) setText(&#x27;totMoney&#x27;, money(totalLow)+&#x27;–&#x27;+money(totalHigh));
  else setText(&#x27;totMoney&#x27;, money(totalLow));
  setText(&#x27;costCnt&#x27;, cnt&gt;0?cnt+&#x27; thuốc đã nhập giá&#x27;:&#x27;cả liệu trình&#x27;);
}

/* ====== LỌC / TÌM ====== */
function applyFilter(){
  var q=(document.getElementById(&#x27;search&#x27;).value||&#x27;&#x27;).toLowerCase().trim();
  var counts={A:0,B:0,C:0,D:0};
  ITEMS.forEach(function(it){
    var el=document.getElementById(&#x27;card_&#x27;+it.key);
    var okCat=(ACTIVE_CAT===&#x27;ALL&#x27;||ACTIVE_CAT===it.cat);
    var okQ=(!q||it.search.indexOf(q)&gt;=0);
    var show=okCat&amp;&amp;okQ;
    if(el) el.style.display=show?&#x27;&#x27;:&#x27;none&#x27;;
    if(show) counts[it.cat]++;
  });
  [&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;,&#x27;D&#x27;].forEach(function(k){var h=document.getElementById(&#x27;hd_&#x27;+k);if(h)h.style.display=counts[k]&gt;0?&#x27;&#x27;:&#x27;none&#x27;;});
  var total=counts.A+counts.B+counts.C+counts.D;
  document.getElementById(&#x27;noRes&#x27;).style.display=total===0?&#x27;block&#x27;:&#x27;none&#x27;;
}

/* ====== TƯƠNG TÁC ====== */
/* ====== CÁCH NHẬP ======
   • Cám ⇄ Tổng KG (5%): nhập 1 ô → ô kia tự tính, Số con + KG/con = TRỐNG. (GIỮ NGUYÊN)
   • Đã có Tổng KG rồi nhập Số con → KG/con = Tổng KG / Số con (kg từng con). (MỚI)
   • Nhập đủ Số con + KG/con → Tổng KG &amp; Cám tự tính.
   Khi gõ Số con / KG/con, máy chỉ ghi ra ô KẾT QUẢ, không ghi đè ô đang gõ → không nhảy loạn.
   Xóa trống 1 ô bất kỳ → xóa sạch cả 4 ô.
   KHÔNG đổi công thức liều. */
var SYNC_PCT=0.05;
var WSRC=&#x27;none&#x27;;   // nguồn trọng lượng đang dùng: &#x27;none&#x27; | &#x27;total&#x27; (Cám/Tổng KG) | &#x27;perbird&#x27; (KG/con)
function cvFmt(v){if(!isFinite(v)||v&lt;=0)return&#x27;&#x27;;return (Math.round(v*1000)/1000).toString();}
function setVal(id,v){var el=document.getElementById(id);if(el)el.value=v;}
function valOf(id){var el=document.getElementById(id);return el?(el.value||&#x27;&#x27;):&#x27;&#x27;;}
function onMain(el){
  var id=el.id;

  // Số ĐANG GÕ DỞ trong ô number (vd &quot;1.&quot; hay &quot;1.2.&quot;) → trình duyệt trả value rỗng tạm thời,

    '<div class="ms-grid" id="msGrid"></div>'+
    '<div class="ms-bar"><div class="ms-bar-info" id="msBarInfo">Chọn số lượng từng mã để lên đơn</div>'+
      '<button class="ms-go" id="msGo" disabled>ĐẶT HÀNG ➜</button></div>'+
    '<div class="ms-panel" id="msPanel">'+
      '<div class="ms-ptitle">📝 THÔNG TIN ĐẶT HÀNG</div>'+
      '<div class="ms-flbl">Tên khách *</div><input class="ms-inp" id="msName" placeholder="Tên / tên trại" autocomplete="off">'+
      '<div class="ms-flbl">Số điện thoại *</div><input class="ms-inp" id="msPhone" type="tel" placeholder="Số gọi / Zalo" autocomplete="off">'+
      '<div class="ms-flbl">Địa chỉ giao (tùy chọn)</div><input class="ms-inp" id="msAddr" placeholder="Xã / huyện / mốc giao" autocomplete="off">'+
      '<div class="ms-flbl">Ghi chú (tùy chọn)</div><input class="ms-inp" id="msNoteIn" placeholder="VD: giao sáng, gối đầu tới mùa…" autocomplete="off">'+
      '<div class="ms-pre" id="msPre"></div>'+
      '<div class="ms-send">'+
        '<button class="ms-sb ms-zalo" id="msZalo">💬 Gửi Zalo</button>'+
        '<button class="ms-sb ms-sms" id="msSms">✉️ Gửi SMS</button>'+
        '<button class="ms-sb ms-copy" id="msCopy">📋 Copy đơn</button>'+
        '<button class="ms-sb ms-call" id="msCall">📞 Gọi shop</button>'+
        (ORDER_WEBHOOK?'<button class="ms-sb ms-hook" id="msHook">🔗 Gửi đơn về shop (tự lưu)</button>':'')+
      '</div>'+
      '<button class="ms-rst" id="msReset">Xóa hết đơn</button>'+
    '</div>'+
    guideHTML();

  /* chips */
  var chips='<div class="ms-chip act" data-cat="ALL">TẤT CẢ</div>';
  Object.keys(GROUPS).forEach(function(k){chips+='<div class="ms-chip" data-cat="'+k+'">'+GROUPS[k].ic+' '+GROUPS[k].lbl+'</div>';});
  document.getElementById("msChips").innerHTML=chips;

  bind();
  renderGrid();
  updateBar();
  /* restore customer */
  if(cust.name)document.getElementById("msName").value=cust.name;
  if(cust.phone)document.getElementById("msPhone").value=cust.phone;
  if(cust.addr)document.getElementById("msAddr").value=cust.addr;
  if(cust.note)document.getElementById("msNoteIn").value=cust.note;
}

function cardHTML(p){
  var it=cart[p.c], qty=(it&&it.qty)||0, gr=GROUPS[p.g], col=CC[p.c]||gr.col;
  var pr=PRICE[p.c], priceLine="";
  if(pr){var le=pr.le?vnd(pr.le):null, si=pr.si?vnd(pr.si):null;
    priceLine='<div class="ms-c-price">'+(le?("Lẻ "+le):"")+(si?("  ·  Sỉ "+si):"")+'</div>';}
  else priceLine='<div class="ms-c-form" style="color:#666">Giá: liên hệ</div>';
  return '<div class="ms-card'+(qty>0?' in':'')+'" data-c="'+p.c+'" style="border-left-color:'+col+'">'+
    '<div class="ms-c-code" style="color:'+col+'">'+p.c+'</div>'+
    '<div class="ms-c-meta">'+
      '<div class="ms-c-grp" style="color:'+col+'">'+gr.ic+' '+gr.lbl+'</div>'+
      '<div class="ms-c-form">'+FORM[p.f].lbl+'</div>'+
      (p.sub?'<div class="ms-c-sub">🔗 '+esc(p.sub)+'</div>':'')+priceLine+
    '</div>'+
    '<div class="ms-c-ctrl">'+
      '<button class="ms-stp" data-c="'+p.c+'" data-d="-1">−</button>'+
      '<input class="ms-qty" data-c="'+p.c+'" inputmode="numeric" value="'+(qty||"")+'" placeholder="0">'+
      '<button class="ms-stp" data-c="'+p.c+'" data-d="1">+</button>'+
      '<select class="ms-unit" data-c="'+p.c+'">'+unitOpts(defUnit(p))+'</select>'+
    '</div>'+
  '</div>';
}

function renderGrid(){
  var g=document.getElementById("msGrid");
  var list=P.filter(function(p){
    var okc=(cat==="ALL"||p.g===cat);
    var okq=(!q||p.c.toLowerCase().indexOf(q.toLowerCase())>=0);
    return okc&&okq;
  });
  g.innerHTML = list.length? list.map(cardHTML).join("") : '<div class="ms-empty">Không có mã nào khớp</div>';
}

function counts(){var codes=0,items=0;P.forEach(function(p){var it=cart[p.c];if(it&&it.qty>0){codes++;items+=it.qty;}});return{codes:codes,items:items};}

function updateBar(){
  var c=counts();
  document.getElementById("msBarInfo").innerHTML = c.codes>0
    ? ('🛒 <b>'+c.codes+'</b> mã · <b>'+c.items+'</b> món'+(mode==="si"?' · <span style="color:#FFB86B">SỈ</span>':''))
    : 'Chọn số lượng từng mã để lên đơn';
  document.getElementById("msGo").disabled = c.codes===0;
}

function setQty(code,val){
  val=Math.max(0,Math.min(99999,parseInt(val,10)||0));
  var p=P.filter(function(x){return x.c===code;})[0]; if(!p)return;
  if(val<=0){ if(cart[code])delete cart[code]; }
  else { cart[code]=cart[code]||{}; cart[code].qty=val; if(!cart[code].unit)cart[code].unit=FORM[p.f].u; }
  var card=area.querySelector('.ms-card[data-c="'+code+'"]');
  if(card)card.classList.toggle("in",val>0);
  save(); updateBar();
  if(document.getElementById("msPanel").classList.contains("open"))refreshPre();
}

/* ===== ORDER TEXT ===== */
function orderText(){
  var L=[];
  L.push("🛒 ĐƠN HÀNG "+(mode==="si"?"SỈ (BUÔN)":"LẺ"));
  L.push("🏪 "+SHOP_NAME);
  L.push("———");
  if(cust.name) L.push("👤 "+cust.name);
  if(cust.phone)L.push("📞 "+cust.phone);
  if(cust.addr) L.push("📍 "+cust.addr);
  L.push("——— SẢN PHẨM ———");
  var tItems=0,tMoney=0,n=0;
  P.forEach(function(p){
    var it=cart[p.c]; if(!it||!(it.qty>0))return;
    n++; tItems+=it.qty;
    var line="• "+p.c+" × "+it.qty+" "+(it.unit||FORM[p.f].u);
    var pr=PRICE[p.c];
    if(pr){var u=mode==="si"?(pr.si||pr.le):pr.le; if(u){var sub=u*it.qty; tMoney+=sub; line+=" = "+vnd(sub);}}
    L.push(line);
  });
  L.push("———");
  L.push("Σ "+n+" mã · "+tItems+" món"+(tMoney?(" · Tạm tính "+vnd(tMoney)):""));
  if(cust.note)L.push("📝 "+cust.note);
  if(!PRICE||!Object.keys(PRICE).length)L.push("(giá: shop báo lại)");
  return L.join("\n");
}
function refreshPre(){document.getElementById("msPre").textContent=orderText();}

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){return navigator.clipboard.writeText(t).then(function(){return true;},function(){return fallbackCopy(t);});}
  return Promise.resolve(fallbackCopy(t));
}
function fallbackCopy(t){try{var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();var ok=document.execCommand("copy");document.body.removeChild(ta);return ok;}catch(e){return false;}}

function needInfo(){
  var n=document.getElementById("msName"), p=document.getElementById("msPhone");
  var bad=false;
  if(!cust.name){n.classList.add("req");bad=true;} else n.classList.remove("req");
  if(!cust.phone){p.classList.add("req");bad=true;} else p.classList.remove("req");
  if(bad)toast("Nhập Tên + SĐT để gửi đơn");
  return !bad;
}

/* ===== BIND ===== */
function bind(){
  /* mode */
  area.querySelectorAll(".ms-mbtn").forEach(function(b){
    b.addEventListener("click",function(){
      mode=b.getAttribute("data-mode");
      area.querySelectorAll(".ms-mbtn").forEach(function(x){x.classList.toggle("act",x===b);});
      document.getElementById("msNote").classList.toggle("on",mode==="si");
      renderGrid(); updateBar();
      if(document.getElementById("msPanel").classList.contains("open"))refreshPre();
    });
  });
  /* chips */
  document.getElementById("msChips").addEventListener("click",function(e){
    var c=e.target.closest(".ms-chip"); if(!c)return;
    cat=c.getAttribute("data-cat");
    document.querySelectorAll("#msChips .ms-chip").forEach(function(x){x.classList.toggle("act",x===c);});
    renderGrid();
  });
  /* search */
  document.getElementById("msSearch").addEventListener("input",function(e){q=e.target.value.trim();renderGrid();});
  /* grid delegation */
  var grid=document.getElementById("msGrid");
  grid.addEventListener("click",function(e){
    var s=e.target.closest(".ms-stp"); if(!s)return;
    var code=s.getAttribute("data-c"), d=parseInt(s.getAttribute("data-d"),10);
    var cur=(cart[code]&&cart[code].qty)||0;
    var nv=cur+d;
    var inp=grid.querySelector('.ms-qty[data-c="'+code+'"]');
    if(inp)inp.value=nv>0?nv:"";
    setQty(code,nv);
  });
  grid.addEventListener("input",function(e){
    if(!e.target.classList.contains("ms-qty"))return;
    setQty(e.target.getAttribute("data-c"),e.target.value);
  });
  grid.addEventListener("change",function(e){
    if(!e.target.classList.contains("ms-unit"))return;
    var code=e.target.getAttribute("data-c");
    cart[code]=cart[code]||{qty:0}; cart[code].unit=e.target.value; save();
    if(document.getElementById("msPanel").classList.contains("open"))refreshPre();
  });
  /* GO */
  document.getElementById("msGo").addEventListener("click",function(){
    var pn=document.getElementById("msPanel"); pn.classList.add("open");
    refreshPre(); pn.scrollIntoView({behavior:"smooth",block:"start"});
  });
  /* customer inputs */
  function ci(id,key){document.getElementById(id).addEventListener("input",function(e){cust[key]=e.target.value.trim();save();refreshPre();});}
  ci("msName","name"); ci("msPhone","phone"); ci("msAddr","addr"); ci("msNoteIn","note");
  /* send */
  document.getElementById("msCopy").addEventListener("click",function(){copyText(orderText()).then(function(ok){toast(ok?"Đã copy đơn ✓ — dán vào Zalo/tin nhắn":"Không copy được, hãy chọn & copy thủ công");});});
  document.getElementById("msZalo").addEventListener("click",function(){
    if(!needInfo())return;
    copyText(orderText()).then(function(){
      toast("Đơn đã copy ✓ — dán vào khung chat Zalo rồi gửi");
      var ph=SHOP_PHONE.replace(/[^0-9]/g,"");
      setTimeout(function(){window.open("https://zalo.me/"+ph,"_blank");},350);
    });
  });
  document.getElementById("msSms").addEventListener("click",function(){
    if(!needInfo())return;
    var ph=SHOP_PHONE.replace(/[^0-9+]/g,"");
    window.location.href="sms:"+ph+"?body="+encodeURIComponent(orderText());
  });
  document.getElementById("msCall").addEventListener("click",function(){
    window.location.href="tel:"+SHOP_PHONE.replace(/[^0-9+]/g,"");
  });
  var hook=document.getElementById("msHook");
  if(hook)hook.addEventListener("click",function(){
    if(!needInfo())return;
    var payload={mode:(mode==="si"?"SỈ":"LẺ"),name:cust.name||"",phone:cust.phone||"",addr:cust.addr||"",items:orderText(),note:cust.note||"",ts:new Date().toISOString()};
    fetch(ORDER_WEBHOOK,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})
      .then(function(){toast("Đã gửi đơn về shop ✓");})
      .catch(function(){toast("Mạng lỗi — hãy gửi qua Zalo/SMS");});
  });
  /* reset */
  document.getElementById("msReset").addEventListener("click",function(){
    if(!confirm("Xóa toàn bộ đơn đang chọn?"))return;
    cart={}; save(); renderGrid(); updateBar(); refreshPre();
    toast("Đã xóa đơn");
  });
}

/* ===== HƯỚNG DẪN CHỦ SHOP (offline) ===== */
function guideHTML(){
  return '<details class="ms-guide"><summary>⚙️ HƯỚNG DẪN CHỦ SHOP — đăng web &amp; nhận đơn (bấm xem)</summary>'+
  '<p style="margin:8px 0"><b>1) Điền thông tin shop:</b> mở file này bằng trình soạn thảo (Notepad / VS Code / Quản lý file trên điện thoại), tìm khối <code>CẤU HÌNH CHỦ SHOP</code> ở đầu thẻ script, sửa <code>SHOP_NAME</code> và <code>SHOP_PHONE</code> (số Zalo nhận đơn). Lưu lại.</p>'+
  '<p style="margin:8px 0"><b>2) Đăng lên web miễn phí (chọn 1 cách):</b></p>'+
  '<ol>'+
    '<li><b>Netlify Drop</b> (nhanh nhất): vào <code>app.netlify.com/drop</code> → kéo thả file HTML này vào → có ngay link web để gửi khách.</li>'+
    '<li><b>GitHub Pages</b> (link cố định): tạo repo → upload file → Settings ▸ Pages ▸ chọn nhánh main → nhận link <code>tên.github.io</code>.</li>'+
    '<li><b>Cloudflare Pages</b>: tạo project → upload file → có link nhanh, ổn định.</li>'+
  '</ol>'+
  '<p style="margin:8px 0">Gửi link đó cho khách qua Zalo/Facebook. Khách mở link, xem quy trình, chọn mã + số lượng, bấm <b>Gửi Zalo</b> → đơn về máy bạn.</p>'+
  '<p style="margin:8px 0"><b>3) (Tùy chọn) Tự lưu đơn vào Google Sheet:</b></p>'+
  '<ol>'+
    '<li>Tạo 1 Google Sheet → menu <b>Tiện ích mở rộng ▸ Apps Script</b>.</li>'+
    '<li>Dán đoạn mã dưới, bấm <b>Triển khai ▸ Tùy chọn triển khai mới ▸ Ứng dụng web</b>, quyền truy cập chọn <b>Bất kỳ ai</b>, copy link <code>/exec</code>.</li>'+
    '<li>Dán link đó vào <code>ORDER_WEBHOOK</code> trong file. Khách bấm "Gửi đơn về shop" là đơn tự rớt vào Sheet.</li>'+
  '</ol>'+
  '<pre>function doPost(e){\n  var sh=SpreadsheetApp.getActiveSheet();\n  var d=JSON.parse(e.postData.contents);\n  sh.appendRow([new Date(),d.mode,d.name,d.phone,d.addr,d.items,d.note]);\n  return ContentService.createTextOutput("ok");\n}</pre>'+
  '<p style="margin:8px 0;color:#777"><b>Lưu ý:</b> khách chỉ thấy mã MT — không thấy tên thuốc. Giá để trống = "liên hệ"; muốn hiện giá thì điền biến <code>PRICE</code>. Đơn lẻ/sỉ được ghi rõ trong nội dung gửi về.</p>'+
  '</details>';
}

/* ===== TOGGLE BUTTON ===== */
var togBtn=document.getElementById("shopTogBtn");
var built=false, open=false;
togBtn.addEventListener("click",function(){
  open=!open;
  if(open&&!built){shell();built=true;}
  area.style.display=open?"block":"none";
  togBtn.textContent=open?"▲ ẨN ĐẶT HÀNG":"🛒 ĐẶT HÀNG · BÁN BUÔN (MT1–MT20)";
  if(open)area.scrollIntoView({behavior:"smooth",block:"start"});
});

})();
